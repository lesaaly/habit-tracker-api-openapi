name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: habit-api/package-lock.json

      - name: Install
        working-directory: habit-api
        run: npm ci

      - name: Lint
        working-directory: habit-api
        run: npm run lint

      - name: Test
        working-directory: habit-api
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build habit-api image
        run: docker compose build habit-api

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d habit-api tempo

      - name: Wait for habit-api
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "habit-api did not become ready in time"
          exit 1

      - name: Smoke check
        run: curl -fsS http://localhost:8080/health

      - name: Logs on failure
        if: failure()
        run: docker compose logs habit-api tempo

      - name: Shutdown
        if: always()
        run: docker compose down -v

  publish:
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push habit-api image
        uses: docker/build-push-action@v6
        with:
          context: ./habit-api
          file: ./habit-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/habit-api:latest