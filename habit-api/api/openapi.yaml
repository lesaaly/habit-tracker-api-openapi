openapi: 3.0.3
info:
  description: API для отслеживания пользовательских привычек
  title: Habit Tracker API
  version: 0.1.0
servers:
- url: /
paths:
  /habits:
    get:
      description: Получение списка всех привычек
      operationId: habitsGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Habit"
                type: array
          description: Список привычек
      x-eov-operation-handler: controllers/DefaultController
    post:
      description: Создание новой привычки
      operationId: habitsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HabitRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
          description: Привычка успешно создана
        "400":
          description: Ошибка в данных запроса
      x-eov-operation-handler: controllers/DefaultController
  /habits/{habit_id}:
    delete:
      description: Удаление привычки
      operationId: habitsHabitIdDELETE
      parameters:
      - description: ID привычки
        explode: false
        in: path
        name: habit_id
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "204":
          description: Привычка удалена
        "404":
          description: Привычка не найдена
      x-eov-operation-handler: controllers/DefaultController
    get:
      description: Получение информации о конкретной привычке
      operationId: habitsHabitIdGET
      parameters:
      - description: ID привычки
        explode: false
        in: path
        name: habit_id
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
          description: Информация о привычке
        "404":
          description: Привычка не найдена
      x-eov-operation-handler: controllers/DefaultController
  /habits/{habit_id}/check:
    post:
      description: Отметить выполнение привычки
      operationId: habitsHabitIdCheckPOST
      parameters:
      - description: ID привычки
        explode: false
        in: path
        name: habit_id
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
          description: Привычка отмечена как выполненная
        "404":
          description: Привычка не найдена
      x-eov-operation-handler: controllers/DefaultController
components:
  schemas:
    Habit:
      example:
        name: Drink water
        description: Drink at least 2 liters of water daily
        created_at: 2025-03-01T10:00:00Z
        id: 1
        streak: 5
      properties:
        id:
          description: Уникальный идентификатор привычки
          example: 1
          type: integer
        name:
          description: Название привычки
          example: Drink water
          type: string
        description:
          description: Описание привычки
          example: Drink at least 2 liters of water daily
          type: string
        streak:
          description: Количество дней подряд выполнения
          example: 5
          minimum: 0
          type: integer
        created_at:
          description: Дата создания привычки
          example: 2025-03-01T10:00:00Z
          format: date-time
          type: string
      required:
      - id
      - name
      - streak
      type: object
    HabitRequest:
      example:
        name: Morning exercise
        description: 10 minutes of stretching every morning
      properties:
        name:
          description: Название привычки
          example: Morning exercise
          type: string
        description:
          description: Описание привычки
          example: 10 minutes of stretching every morning
          type: string
      required:
      - name
      type: object
